  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg0:#05060b;--bg1:#090c17;--bg2:#0d1120;--bg3:#141928;
    --border:#1b2035;--borderhi:#262f4a;
    --blue:#4f7ef7;--blue-d:rgba(79,126,247,0.12);
    --green:#22d3a8;--green-d:rgba(34,211,168,0.1);
    --amber:#f5a623;--amber-d:rgba(245,166,35,0.1);
    --red:#f87171;--red-d:rgba(248,113,113,0.1);
    --purple:#a78bfa;--purple-d:rgba(167,139,250,0.1);
    --text:#dde0ef;--dim:#7a8db0;--muted:#38446a;
    --mono:'IBM Plex Mono','Fira Code',monospace;
    --sans:'IBM Plex Sans',-apple-system,sans-serif;
  }
  body{font-family:var(--sans);background:var(--bg0);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  .fade-in{animation:fadeUp .22s ease both}
  .suggestion-chip:hover{background:var(--bg3)!important;border-color:var(--blue)!important;color:var(--blue)!important}
  .send-btn:hover:not(:disabled){background:#3b6ae8!important}
  .send-btn:disabled{opacity:.35;cursor:not-allowed}
  .key-gate{position:fixed;inset:0;background:rgba(5,6,11,0.97);display:flex;align-items:center;justify-content:center;z-index:100}
  .modal-overlay{position:fixed;inset:0;background:rgba(5,6,11,0.92);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
  .modal-box{background:#090c17;border:1px solid #262f4a;border-radius:12px;width:100%;max-width:920px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}
  .modal-header{padding:14px 18px;border-bottom:1px solid #1b2035;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .modal-body{overflow-y:auto}
  .permit-row:hover{background:#0d1120}
  .badge-btn{cursor:pointer;transition:opacity .15s}
  .badge-btn:hover{opacity:0.75}
  .key-box{background:#090c17;border:1px solid #262f4a;border-radius:12px;padding:32px;width:380px;max-width:90vw}
  .key-input{width:100%;background:#0d1120;border:1px solid #1b2035;border-radius:8px;padding:10px 12px;color:#dde0ef;font-family:monospace;font-size:12px;margin:12px 0}
  .key-input:focus{outline:none;border-color:#4f7ef7}
  .key-btn{width:100%;background:#4f7ef7;border:none;border-radius:8px;padding:10px;color:white;font-size:13px;cursor:pointer;font-family:inherit}
  input:focus{outline:none}
</style>

const TOOL_DEFS = [
  {name:'search_permits',description:'Sucht Baugenehmigungen nach Antragsteller, Adresse, Status oder Typ.',input_schema:{type:'object',properties:{applicant_name:{type:'string'},address:{type:'string'},status_filter:{type:'string'},type_filter:{type:'string'}},required:[]}},
  {name:'get_permit_details',description:'Vollständige Details zu einer Baugenehmigung inkl. fehlender Dokumente.',input_schema:{type:'object',properties:{permit_id:{type:'string'}},required:['permit_id']}},
  {name:'get_kpi_summary',description:'KPI-Übersicht: Statusverteilung, überfällige Anträge, Sachbearbeiter-Workload.',input_schema:{type:'object',properties:{overdue_days:{type:'number'},status_filter:{type:'string'}},required:[]}},
  {name:'prepare_data_entry',description:'Bereitet Genehmigungsformular vor mit aktuellem Datum und Antragstellerdaten.',input_schema:{type:'object',properties:{permit_id:{type:'string'},field_updates:{type:'object'}},required:['permit_id']}},
];

function executeTool(name, input) {
  switch(name) {
    case 'search_permits': {
      let r = [...PERMITS];
      if(input.applicant_name) r=r.filter(p=>p.applicant.toLowerCase().includes(input.applicant_name.toLowerCase()));
      if(input.address) r=r.filter(p=>p.address.toLowerCase().includes(input.address.toLowerCase()));
      if(input.status_filter) r=r.filter(p=>p.status===input.status_filter);
      if(input.type_filter) r=r.filter(p=>p.type===input.type_filter);
      return {count:r.length,permits:r.map(p=>({id:p.id,applicant:p.applicant,address:p.address,type:p.type,status:p.status,submitted:p.submitted,deadline:p.deadline,missing_count:p.missing.length,clerk:p.clerk}))};
    }
    case 'get_permit_details': {
      const p=PERMITS.find(x=>x.id===input.permit_id);
      if(!p) return {error:`Genehmigung ${input.permit_id} nicht gefunden`};
      const days=Math.floor((new Date(TODAY)-new Date(p.deadline))/86400000);
      return {...p,days_overdue:Math.max(0,days),is_overdue:days>0,missing_count:p.missing.length};
    }
    case 'get_kpi_summary': {
      const od=input.overdue_days||0;
      const bySt={};PERMITS.forEach(p=>{bySt[p.status]=(bySt[p.status]||0)+1});
      const byTy={};PERMITS.forEach(p=>{byTy[p.type]=(byTy[p.type]||0)+1});
      const overdue=PERMITS.filter(p=>{const d=Math.floor((new Date(TODAY)-new Date(p.deadline))/86400000);return d>od;});
      const byCl={};PERMITS.forEach(p=>{byCl[p.clerk]=(byCl[p.clerk]||0)+1});
      return {total:PERMITS.length,by_status:bySt,by_type:byTy,overdue_count:overdue.length,overdue_list:overdue.map(p=>({id:p.id,applicant:p.applicant,deadline:p.deadline,days_over:Math.floor((new Date(TODAY)-new Date(p.deadline))/86400000),clerk:p.clerk})),with_missing_docs:PERMITS.filter(p=>p.missing.length>0).length,clerks:byCl};
    }
    case 'prepare_data_entry': {
      const p=PERMITS.find(x=>x.id===input.permit_id);
      if(!p) return {error:`Genehmigung ${input.permit_id} nicht gefunden`};
      return {status:'bereit',permit_id:p.id,antragsteller:p.applicant,vollstaendig:p.missing.length===0,fehlende_dokumente:p.missing,pre_filled:{genehmigungsnummer:p.id,antragsteller:p.applicant,adresse:p.address,vorhabentyp:p.type,eingangsdatum:p.submitted,frist:p.deadline,bearbeitungsdatum:TODAY,sachbearbeiter:p.clerk,genehmigungsdatum:TODAY,unterschrift_datum:TODAY,formular_version:'VwVfG §73 — Ausg. 2024',...(input.field_updates||{})}};
    }
    default: return {error:`Unbekanntes Tool: ${name}`};
  }
}

function renderMarkdown(text){
  const lines = text.split('\n');
  const elements = [];
  let i = 0;
  while(i < lines.length){
    const line = lines[i];
    // H3
    if(line.startsWith('### ')){
      elements.push(h('div',{key:i,style:{fontWeight:600,fontSize:13,color:C.text,marginTop:10,marginBottom:3}},parseLine(line.slice(4))));
    }
    // H2
    else if(line.startsWith('## ')){
      elements.push(h('div',{key:i,style:{fontWeight:600,fontSize:14,color:C.text,marginTop:12,marginBottom:4,borderBottom:`1px solid ${C.border}`,paddingBottom:4}},parseLine(line.slice(3))));
    }
    // Bullet
    else if(line.match(/^[-*] /)){
      elements.push(h('div',{key:i,style:{display:'flex',gap:6,marginTop:2}},
        h('span',{style:{color:C.blue,flexShrink:0,marginTop:1}},'›'),
        h('span',null,parseLine(line.slice(2)))
      ));
    }
    // Numbered list
    else if(line.match(/^\d+\. /)){
      const num=line.match(/^(\d+)\. /)[1];
      elements.push(h('div',{key:i,style:{display:'flex',gap:6,marginTop:2}},
        h('span',{style:{color:C.blue,flexShrink:0,fontFamily:C.mono,fontSize:11,marginTop:1}},num+'.'),
        h('span',null,parseLine(line.replace(/^\d+\. /,'')))
      ));
    }
    // Horizontal rule
    else if(line.match(/^---+$/)){
      elements.push(h('hr',{key:i,style:{border:'none',borderTop:`1px solid ${C.border}`,margin:'8px 0'}}));
    }
    // Empty line
    else if(line.trim()===''){
      elements.push(h('div',{key:i,style:{height:6}}));
    }
    // Normal paragraph
    else {
      elements.push(h('div',{key:i,style:{marginTop:1}},parseLine(line)));
    }
    i++;
  }
  return elements;
}

function parseLine(text){
  // Split on **bold** and render spans
  const parts = text.split(/\*\*(.*?)\*\*/g);
  if(parts.length===1) return text;
  return parts.map((p,i)=>
    i%2===1
      ? h('strong',{key:i,style:{color:C.text,fontWeight:600}},p)
      : p
  );
}

function App(){
  const [msgs,setMsgs]=useState([]);
  const [toolCalls,setToolCalls]=useState([]);
  const [loading,setLoading]=useState(false);
  const [input,setInput]=useState('');
  const [activeTool,setActiveTool]=useState(null);
  const [showTable,setShowTable]=useState(false);
  const histRef=useRef([]);
  const bottomRef=useRef(null);
  const inputRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'})},[msgs,loading]);

  async function send(text){
    if(!text.trim()||loading)return;
    setLoading(true);setInput('');
    setMsgs(p=>[...p,{role:'user',text}]);
    histRef.current=[...histRef.current,{role:'user',content:text}];
    let cur=[...histRef.current];
    try{
      while(true){
        const res=await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',headers:{'Content-Type':'application/json','x-api-key':window.__hhvKey||'','anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
          body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYSTEM,tools:TOOL_DEFS,messages:cur})
        });
        const data=await res.json();
        if(data.error) throw new Error(data.error.message);
        if(data.stop_reason==='tool_use'){
          const tus=data.content.filter(b=>b.type==='tool_use');
          const results=[];
          for(const tu of tus){
            setActiveTool(tu.name);
            const result=executeTool(tu.name,tu.input);
            const tc={id:tu.id,tool:tu.name,params:tu.input,result,time:new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'})};
            setToolCalls(p=>[...p,tc]);
            results.push({type:'tool_result',tool_use_id:tu.id,content:JSON.stringify(result)});
          }
          cur=[...cur,{role:'assistant',content:data.content},{role:'user',content:results}];
        } else {
          const txt=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
          histRef.current=[...cur,{role:'assistant',content:data.content}];
          setMsgs(p=>[...p,{role:'assistant',text:txt}]);
          setActiveTool(null);break;
        }
      }
    } catch(e){
      setMsgs(p=>[...p,{role:'assistant',text:`Fehler: ${e.message}`}]);
      setActiveTool(null);
    }
    setLoading(false);
    setTimeout(()=>inputRef.current?.focus(),100);
  }

  const latestCall=toolCalls[toolCalls.length-1];

  return h('div',{style:{fontFamily:C.sans,background:C.bg0,color:C.text,height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}},
    showTable&&h(PermitTableModal,{onClose:()=>setShowTable(false)}),

      h('div',{style:{width:28,height:28,background:C.blue,borderRadius:6,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}},'🏗'),
      h('span',{style:{fontWeight:600,fontSize:14,letterSpacing:'-0.02em'}},'HHV-Bau'),
      h('span',{style:{color:C.muted,fontSize:12}},'Permit System · Leipzig'),
      h('div',{style:{width:1,height:18,background:C.border,margin:'0 2px'}}),
      h('span',{style:{fontFamily:C.mono,fontSize:10,color:C.green,background:C.greenD,border:`1px solid ${C.green}35`,padding:'2px 8px',borderRadius:4}},'● 4 Tools'),
      h('span',{className:'badge-btn',onClick:()=>setShowTable(true),style:{fontFamily:C.mono,fontSize:10,color:C.blue,background:C.blueD,border:`1px solid ${C.blue}35`,padding:'2px 8px',borderRadius:4,userSelect:'none'}},`${PERMITS.length} Permits ↗`),

        ),
        h('div',{style:{padding:'10px 12px 12px',borderTop:`1px solid ${C.border}`,background:C.bg1}},
          msgs.length>0&&h('div',{style:{display:'flex',gap:5,marginBottom:8,flexWrap:'wrap'}},
            SUGGESTIONS.slice(0,3).map(s=>h('button',{key:s,className:'suggestion-chip',onClick:()=>send(s),style:{fontFamily:C.sans,fontSize:10,color:C.muted,background:'none',border:`1px solid ${C.border}`,padding:'3px 9px',borderRadius:12,cursor:'pointer',transition:'all .15s'}},s))
          ),
          h('div',{style:{display:'flex',gap:8,background:C.bg2,border:`1px solid ${C.borderHi}`,borderRadius:10,padding:'8px 8px 8px 12px',alignItems:'center'}},
            h('input',{ref:inputRef,value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send(input);}},placeholder:'Auf Deutsch fragen…',style:{flex:1,background:'none',border:'none',color:C.text,fontSize:12,fontFamily:C.sans}}),
            h('button',{className:'send-btn',onClick:()=>send(input),disabled:loading||!input.trim(),style:{background:C.blue,border:'none',borderRadius:7,width:30,height:30,cursor:'pointer',color:'white',fontSize:13,transition:'background .15s',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}},loading?'…':'↑')
          )
        )
      ),
      h('div',{style:{width:'48%',display:'flex',flexDirection:'column',overflow:'hidden',background:C.bg1}},
        h('div',{style:{padding:'12px 16px',borderBottom:`1px solid ${C.border}`,display:'flex',alignItems:'center',gap:8,flexShrink:0}},
          h('span',{style:{fontFamily:C.mono,fontSize:10,color:C.muted,textTransform:'uppercase',letterSpacing:'0.08em'}},'MCP Inspector'),
          toolCalls.length>0&&h('span',{style:{fontFamily:C.mono,fontSize:9,color:C.blue,background:C.blueD,border:`1px solid ${C.blue}30`,padding:'1px 6px',borderRadius:3}},`${toolCalls.length} calls`),
          activeTool&&h('span',{style:{fontFamily:C.mono,fontSize:9,color:C.amber,background:C.amberD,border:`1px solid ${C.amber}30`,padding:'1px 6px',borderRadius:3,animation:'pulse 1s infinite'}},'● LIVE')
        ),
        h('div',{style:{flex:1,overflowY:'auto',padding:12}},
          toolCalls.length===0
            ? h(EmptyInspector)
            : h('div',null,
                h(ExpandedToolCall,{call:latestCall,isActive:!!activeTool}),
                toolCalls.length>1&&h('div',{style:{marginTop:10}},
                  h('div',{style:{fontFamily:C.mono,fontSize:9,color:C.muted,textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:6}},'Frühere Aufrufe'),
                  [...toolCalls].reverse().slice(1).map(tc=>h(CompactToolCall,{key:tc.id,call:tc}))
                )
              )
        )
      )
    )
  );
}

function PermitTableModal({onClose}){
  const [filter,setFilter]=useState('');
  const filtered=PERMITS.filter(p=>
    p.id.toLowerCase().includes(filter.toLowerCase())||
    p.applicant.toLowerCase().includes(filter.toLowerCase())||
    p.address.toLowerCase().includes(filter.toLowerCase())||
    p.type.toLowerCase().includes(filter.toLowerCase())
  );
  const cols=[['ID',100],['Antragsteller',145],['Adresse',195],['Typ',105],['Status',118],['Frist',80],['Sachb.',95],['Docs',48]];
  return h('div',{className:'modal-overlay',onClick:e=>{if(e.target===e.currentTarget)onClose()}},
    h('div',{className:'modal-box'},
      h('div',{className:'modal-header'},
        h('span',{style:{fontSize:14,fontWeight:600,letterSpacing:'-0.02em'}},'Permit-Datenbank'),
        h('span',{style:{fontFamily:C.mono,fontSize:10,color:C.green,background:C.greenD,border:`1px solid ${C.green}35`,padding:'2px 8px',borderRadius:4}},`${PERMITS.length} Eintraege`),
        h('input',{value:filter,onChange:e=>setFilter(e.target.value),placeholder:'Filtern nach ID, Name, Adresse...',style:{marginLeft:'auto',background:C.bg2,border:`1px solid ${C.border}`,borderRadius:6,padding:'5px 10px',color:C.text,fontFamily:C.mono,fontSize:11,width:220}}),
        h('button',{onClick:onClose,style:{marginLeft:8,background:'none',border:`1px solid ${C.border}`,borderRadius:6,color:C.dim,cursor:'pointer',padding:'4px 10px',fontSize:12,fontFamily:C.sans}},'x Schliessen')
      ),
      h('div',{className:'modal-body'},
        h('table',{style:{width:'100%',borderCollapse:'collapse',fontSize:11,fontFamily:C.mono}},
          h('thead',null,
            h('tr',{style:{position:'sticky',top:0,background:C.bg1,zIndex:1}},
              ...cols.map(([t,w])=>h('th',{key:t,style:{textAlign:'left',color:C.muted,padding:'10px 12px',fontWeight:500,minWidth:w,borderBottom:`1px solid ${C.border}`,whiteSpace:'nowrap'}},t))
            )
          ),
          h('tbody',null,
            filtered.length===0
              ? h('tr',null,h('td',{colSpan:8,style:{padding:'24px',textAlign:'center',color:C.muted,fontFamily:C.sans}},'Keine Ergebnisse'))
              : filtered.map(p=>
                  h('tr',{key:p.id,className:'permit-row',style:{borderBottom:`1px solid ${C.border}`}},
                    h('td',{style:{padding:'8px 12px',color:C.blue,whiteSpace:'nowrap'}},p.id),
                    h('td',{style:{padding:'8px 12px',color:C.text}},p.applicant),
                    h('td',{style:{padding:'8px 12px',color:C.dim,fontSize:10}},p.address),
                    h('td',{style:{padding:'8px 12px',color:C.purple,fontSize:10}},p.type),
                    h('td',{style:{padding:'8px 12px'}},h(StatusBadge,{status:p.status,small:true})),
                    h('td',{style:{padding:'8px 12px',color:p.status==='ueberfaellig'?C.red:C.dim,whiteSpace:'nowrap'}},p.deadline.slice(5)),
                    h('td',{style:{padding:'8px 12px',color:C.dim}},p.clerk.split(' ')[0]),
                    h('td',{style:{padding:'8px 12px',color:p.missing.length>0?C.amber:C.green,textAlign:'center'}},p.missing.length>0?`${p.missing.length} !`:'ok')
                  )
                )
          )
        )
      )
    )
  );
}

function KeyGate({onKey}){
  const [val,setVal]=useState('');
  return h('div',{className:'key-gate'},
    h('div',{className:'key-box'},
      h('div',{style:{fontSize:22,marginBottom:8}},'🏗'),
      h('div',{style:{fontSize:16,fontWeight:600,marginBottom:4,letterSpacing:'-0.02em'}},'HHV-Bau MCP Demo'),
      h('div',{style:{fontSize:11,color:'#7a8db0',marginBottom:16,lineHeight:1.6}},'Anthropic API-Schlüssel eingeben um fortzufahren. Der Schlüssel wird nur lokal im Browser gespeichert.'),
      h('input',{className:'key-input',type:'password',placeholder:'sk-ant-...',value:val,onChange:e=>setVal(e.target.value),onKeyDown:e=>{if(e.key==='Enter'&&val.startsWith('sk-'))onKey(val)}}),
      h('button',{className:'key-btn',onClick:()=>{if(val.startsWith('sk-'))onKey(val);},disabled:!val.startsWith('sk-')},'Demo starten →'),
      h('div',{style:{fontSize:10,color:'#38446a',marginTop:12,textAlign:'center'}},'Schlüssel unter platform.anthropic.com/api-keys')
    )
  );
}

function Root(){
  const saved=sessionStorage.getItem('hhv_key')||'';
  if(saved) window.__hhvKey=saved;
  const [key,setKey]=useState(saved);
  function handleKey(k){window.__hhvKey=k;sessionStorage.setItem('hhv_key',k);setKey(k);}
  if(!key) return h(KeyGate,{onKey:handleKey});
  return h(App);
}

createRoot(document.getElementById('app')).render(h(Root));
</script>
</body>
</html>
